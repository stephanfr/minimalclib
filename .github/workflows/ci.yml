name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/stephanfr/aarch64-bare-metal-toolchain:13.3.rel1

jobs:
  check-dockerfile:
    runs-on: ubuntu-latest
    outputs:
      dockerfile_changed: ${{ steps.filter.outputs.dockerfile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if Dockerfile.toolchain changed
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dockerfile:
              - 'Dockerfile.toolchain'

  publish-image:
    needs: check-dockerfile
    if: needs.check-dockerfile.outputs.dockerfile_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push toolchain image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.toolchain
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=registry,ref=ghcr.io/stephanfr/aarch64-bare-metal-toolchain:buildcache
          cache-to: type=registry,ref=ghcr.io/stephanfr/aarch64-bare-metal-toolchain:buildcache,mode=max

  build-and-test:
    needs: [check-dockerfile, publish-image]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/stephanfr/aarch64-bare-metal-toolchain:13.3.rel1

    env:
      TOOLS: /opt
      THIRD_PARTY: /opt
      CPPUTEST_PATH: /opt/cpputest

    steps:
      - uses: actions/checkout@v4

      - name: Build aarch64 library
        run: make lib

      - name: Build and run native tests
        run: make test
