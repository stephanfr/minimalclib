name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/stephanfr/aarch64-bare-metal-toolchain:13.3.rel1

jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push toolchain image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.toolchain
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=registry,ref=ghcr.io/stephanfr/aarch64-bare-metal-toolchain:buildcache
          cache-to: type=registry,ref=ghcr.io/stephanfr/aarch64-bare-metal-toolchain:buildcache,mode=max

  build-and-test:
    needs: publish-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/stephanfr/aarch64-bare-metal-toolchain:13.3.rel1

    env:
      TOOLS: /opt
      THIRD_PARTY: /opt
      CPPUTEST_PATH: /opt/cpputest

    steps:
      - uses: actions/checkout@v4

      - name: Build aarch64 library
        run: make lib

      - name: Build and run native tests
        run: make test
